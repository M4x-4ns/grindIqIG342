name: Deploy

# Runs on push to deployable branches. An inline `ci` job runs lint,
# typecheck, and tests first — both deploy jobs are gated on it via `needs`.
# This avoids the workflow_run default-branch limitation while still ensuring
# CI must pass before any deployment proceeds.
on:
  push:
    branches:
      - develop      # → Vercel staging
      - staging      # → Vercel staging
      - 'release/**' # → Vercel staging (final QA before production)
      - main         # → Vercel production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── CI gate — must pass before either deploy job runs ────────────────────
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check (frontend)
        run: npm run typecheck

      - name: Type check (api/)
        run: npm run typecheck:api

      - name: Test
        run: npm test

  # ─── Staging — develop, staging, or release/* ──────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ci]
    if: >-
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/staging' ||
      startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for staging
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_APP_ENV: staging
          VITE_DEV_SENSOR_BYPASS: false

      - name: Deploy to Vercel staging
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT

  # ─── Production — main only ────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_APP_ENV: production
          VITE_DEV_SENSOR_BYPASS: false

      - name: Deploy to Vercel production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
